<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors (Best of N)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #fdfbfb, #ebedee);
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: #333;
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    #setup, .buttons, .results, #play-again {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 2rem;
      margin: 1rem;
      width: 100%;
      max-width: 500px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    button {
      font-size: 1.2rem;
      padding: 1rem 2rem;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }

    button:hover {
      background: #43a047;
    }

    button:active {
      transform: scale(0.95);
    }

    input[type="number"] {
      padding: 0.6rem;
      font-size: 1rem;
      width: 100px;
      text-align: center;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 0.5rem;
    }

    .results {
      font-size: 1.1rem;
      color: #222;
    }

    .results p {
      margin: 0.5rem 0;
    }

    #play-again button {
      background-color: #2196F3;
    }

    #play-again button:hover {
      background-color: #1976D2;
    }
  </style>
</head>
<body>
  <img src="https://emojiapi.dev/api/v1/rock/64.png" alt="Rock" width="60">
  <h1>Rock Paper Scissors (Best of N)</h1>

  <div id="setup">
    <p>How many rounds do you want to play?</p>
    <input type="number" id="rounds-input" min="1" placeholder="e.g., 5" />
    <br />
    <button onclick="startGame()">Start Game</button>
  </div>

  <div class="buttons" id="game-buttons" style="display: none;">
    <button onclick="play('rock')">🪨 Rock</button>
    <button onclick="play('paper')">📄 Paper</button>
    <button onclick="play('scissors')">✂️ Scissors</button>
  </div>

  <div class="results" id="results"></div>
  <div id="play-again" style="display: none;">
    <button onclick="resetGame()">Play Again</button>
  </div>

  <script>
    const moves = ["rock", "paper", "scissors"];
    let userHistory = { rock: 0, paper: 0, scissors: 0 };
    let userScore = 0;
    let computerScore = 0;
    let roundsToPlay = 0;
    let roundsPlayed = 0;

    function startGame() {
      const input = document.getElementById("rounds-input").value;
      roundsToPlay = parseInt(input);
      if (!roundsToPlay || roundsToPlay < 1) {
        alert("Please enter a valid number of rounds.");
        return;
      }

      document.getElementById("setup").style.display = "none";
      document.getElementById("game-buttons").style.display = "flex";
      updateResults("Game started! First to " + roundsToPlay + " rounds wins.");
    }

    function predictUserMove() {
      const entries = Object.entries(userHistory);
      entries.sort((a, b) => b[1] - a[1]);
      const topMoves = entries.filter(e => e[1] === entries[0][1]);
      const predicted = topMoves[Math.floor(Math.random() * topMoves.length)][0];
      return predicted;
    }

    function counterMove(predicted) {
      if (predicted === "rock") return "paper";
      if (predicted === "paper") return "scissors";
      return "rock";
    }

    function play(userMove) {
      if (roundsPlayed >= roundsToPlay) return;

      userHistory[userMove]++;
      roundsPlayed++;

      let computerMove;
      const total = Object.values(userHistory).reduce((a, b) => a + b);
      if (total < 3) {
        computerMove = moves[Math.floor(Math.random() * 3)];
      } else {
        const predicted = predictUserMove();
        computerMove = counterMove(predicted);
      }

      const result = getResult(userMove, computerMove);
      if (result === "You win!") userScore++;
      else if (result === "Computer wins!") computerScore++;

      updateResults(`
        <p><strong>Round ${roundsPlayed}/${roundsToPlay}</strong></p>
        <p>You chose: ${userMove}</p>
        <p>Computer chose: ${computerMove}</p>
        <p><strong>${result}</strong></p>
        <p>Score — You: ${userScore} | Computer: ${computerScore}</p>
      `);
       if (roundsPlayed === roundsToPlay) {
        endGame();
      }
    }

    function getResult(user, computer) {
      if (user === computer) return "It's a tie!";
      if (
        (user === "rock" && computer === "scissors") ||
        (user === "paper" && computer === "rock") ||
        (user === "scissors" && computer === "paper")
      ) return "You win!";
      return "Computer wins!";
    }

    function updateResults(html) {
      document.getElementById("results").innerHTML = html;
    }

    function endGame() {
      let finalResult;
      if (userScore > computerScore) {
        finalResult = "🎉 You won the game!";
      } else if (computerScore > userScore) {
        finalResult = "💻 Computer won the game!";
      } else {
        finalResult = "🤝 It's a tie game!";
      }
      updateResults(document.getElementById("results").innerHTML + `<p><strong>${finalResult}</strong></p>`);
      document.getElementById("game-buttons").style.display = "none";
      document.getElementById("play-again").style.display = "block";
    }

    function resetGame() {
      userHistory = { rock: 0, paper: 0, scissors: 0 };
      userScore = 0;
      computerScore = 0;
      roundsToPlay = 0;
      roundsPlayed = 0;
      document.getElementById("results").innerHTML = "";
      document.getElementById("setup").style.display = "block";
      document.getElementById("game-buttons").style.display = "none";
      document.getElementById("play-again").style.display = "none";
      document.getElementById("rounds-input").value = "";
    }
  </script>
</body>
</html>
